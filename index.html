<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Loja</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f5f7fb;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: 2.2rem;
            color: #1e293b;
        }
        .sub {
            text-align: center;
            color: #475569;
            margin-bottom: 2rem;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }
        .product-card {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
        }
        .product-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #e2e8f0;
        }
        .product-info {
            padding: 1.2rem;
        }
        .product-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }
        .btn-buy {
            display: inline-block;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            margin-top: 0.8rem;
            transition: background 0.2s;
            text-align: center;
            width: 100%;
        }
        .btn-buy:hover {
            background: #2563eb;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            color: #64748b;
            font-size: 0.8rem;
        }
        @media (max-width: 640px) {
            .products-grid {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🛍️ Minha Loja</h1>
    <div class="sub">Produtos incríveis para você</div>
    <div class="products-grid" id="productsGrid"></div>
    <footer>Loja gerada dinamicamente | Todos os direitos reservados</footer>
</div>

<script>
    // =============================================
    // ARRAY DE PRODUTOS (EDITÁVEL PELO PAINEL ADMIN)
    // =============================================
    let produtos = [
        {
                "nome": "cordao com cruz ortodox",
                "imagem": "https://ae01.alicdn.com/kf/Sd6fb8113d6d6428dbecdbccd47f6adabt.jpg_350x350.jpg",
                "link": "https://s.click.aliexpress.com/e/_c3MuqDQ9"
        }
];
    // =============================================

    function renderizarProdutos() {
        const grid = document.getElementById("productsGrid");
        if (!grid) return;
        grid.innerHTML = "";
        produtos.forEach(prod => {
            const card = document.createElement("div");
            card.className = "product-card";
            card.innerHTML = `
                <img class="product-img" src="${prod.imagem}" alt="${prod.nome}" loading="lazy">
                <div class="product-info">
                    <div class="product-name">${prod.nome}</div>
                    <a href="${prod.link}" target="_blank" class="btn-buy">Comprar →</a>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    renderizarProdutos();
</script>
</body>
</html>
